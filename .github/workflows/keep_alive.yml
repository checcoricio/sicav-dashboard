name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 8 * * *'   # ogni giorno alle 08:00 UTC
  workflow_dispatch:        # permette anche esecuzione manuale

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://sicav-dashboard-ft5d8yfwjgyx6pyxbff7km.streamlit.app/
